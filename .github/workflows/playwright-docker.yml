name: Playwright Docker Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  playwright-docker-tests:
    timeout-minutes: 15 # Establece un tiempo límite para el trabajo
    runs-on: ubuntu-latest
    # Permisos necesarios para publicar el reporte en GitHub Pages
    permissions:
      contents: write
      pages: write
      actions: write
      checks: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file for Docker Compose
        # GitHub Actions no expone automáticamente secrets a docker-compose.
        # Creamos un .env temporal para que docker-compose pueda leerlos.
        env:
          STANDARD_USER: ${{ secrets.STANDARD_USER }}
          PASSWORD: ${{ secrets.PASSWORD }}
          BASE_URL: ${{ vars.BASE_URL || 'https://www.saucedemo.com' }}
        run: |
          printf "STANDARD_USER=%s\nPASSWORD=%s\nBASE_URL=%s\n" "$STANDARD_USER" "$PASSWORD" "$BASE_URL" > .env

      - name: Build and Run Playwright Tests with Docker Compose
        # Usamos --exit-code-from para que el paso falle si las pruebas de Playwright fallan.
        # El servicio 'allure' no se levanta aquí, solo el de pruebas.
        run: docker compose up --build playwright-tests --exit-code-from playwright-tests

      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always() # Sube el reporte incluso si las pruebas fallan
        with:
          name: playwright-html-report
          path: playwright-report/

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always() # Sube los resultados de Allure incluso si las pruebas fallan
        with:
          name: allure-results
          path: allure-results/

      - name: Generate and Publish Allure Report
        uses: simple-elf/allure-report-action@v1.11
        if: always() # Genera el reporte Allure incluso si las pruebas fallan
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          publish_branch: gh-pages